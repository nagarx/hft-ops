# =============================================================================
# #PY-243 R-19 MULTI-SEED VALIDATION — Cycle 10
# =============================================================================
#
# PURPOSE: Validate R-19's +4.9pp PT precision lift (26.92% vs R-17a 22.0% on
#   TB v3p0 corpus) survives perturbation across N=5 seeds. Per Lesson #12
#   mandatory ("any 'X > Y' claim requires N≥3 seeds with bootstrap CI before
#   final verdict") + R-16e Lesson #93 precedent (R-16d single-seed Ratio=2.585
#   collapsed under N=10 to mean=1.653). R-19 +4.9pp is currently single-seed
#   (seed=42 only) → potentially within seed variance → entire Phase 2 TB
#   decision matrix would rest on unverified premise.
#
# AUTHORIZATION: User authorized 2026-05-16 LATE NIGHT post 8-agent Wave 1+2
#   adversarial gate that OVERTURNED Phase 2 TB priority. Wave 2 REFUTE
#   convergent verdict: Phase 2 TB rests on R-19 unverified single-seed
#   premise. #PY-243 is HARD PREREQUISITE.
#
# PRE-IMPL ADVERSARIAL DESIGN GATE (3 parallel agents, 2026-05-16 LATE NIGHT):
#   - Agent A (empirical readiness): READY-WITH-CAVEATS at 6-9 hr realistic
#     (vs banner 3.5 hr; #PY-243 banner UNDER-BUDGETED)
#   - Agent B (pre-registered gates): H1.a/b/c + H2 + H3 + edge cases LOCKED
#     pre-run with explicit thresholds; N=5 (seeds 43-47) recommendation
#   - Agent C (REFUTE-the-plan): 9 findings; SAFE-WITH-MITIGATIONS; 8
#     critical design adjustments baked in (M1-M8 below)
#
# DESIGN MITIGATIONS APPLIED (from pre-impl gate):
#   M1: NEW r19_multi_seed_analysis.py (~250 LOC) — r16e_analysis.py is
#       HARDCODED for N=10 + 40 grid + 4 cells; cannot reuse
#   M2: --force flag REQUIRED at sweep launch (R-19 seed=42 record exists at
#       hft-ops/ledger/records/cycle10_..._r19_multi_seed_*_seed_42.json
#       WAIT — seed_42 is NOT in this sweep. R-19's stored seed_42 record
#       is in a DIFFERENT path. But Phase Y composer fingerprint may still
#       match for one of the seed_43-47 cells if RNG state composition is
#       seed-independent. --force ensures all 5 cells produce fresh records)
#   M3: N=5 seeds 43-47 (95% CI half-width ~2.48pp; power balanced)
#   M4: H1.a/b/c + H2 + H3.a/b/c/d gates PRE-REGISTERED below
#   M5: H6 interim-analysis gate (post-hoc): if σ(PT_precision) > 4%
#       across 5 seeds → analyzer outputs INDETERMINATE-DOWNGRADED-NEED-N10
#       (no automatic 5-more-seed extension; manual follow-up cycle decision)
#   M6: PT_precision = `per_class_precision[2]` (training-time confusion
#       matrix; cost-model-INDEPENDENT). NOT predicted_trade_win_rate.
#   M7: Cost-model anchor for backtest comparison = POST-HF-1 (IV=0.25 for
#       Deep ITM via OpraCalibratedCosts.deep_itm() factory; HF-1 commit
#       175307c shipped 2026-05-16 LATE NIGHT). R-19's stored OptRet=-3.11%
#       is PRE-HF-1 (IV=0.40) — NOT comparable. PT_precision IS comparable
#       (cost-independent). Report both with anchor labels.
#   M8: Pre-register pivot for REFUTE branch: R-20 HMHP cascade architecture
#       OR R-18 cost-aware barrier sweep (depending on detailed REFUTE shape)
#
# PROVENANCE: Cloned from cycle9_r16e_multi_seed_h60_point.yaml structure;
#   inline trainer_config replicates r19_tlob_tb_v3p0_h30.yaml effective
#   config (post _base composition merge). Pre-impl gate complete; mid-impl +
#   pre-commit gates pending implementation phase.
#
# COMPUTE BUDGET (realistic per Agent A):
#   - Per-seed training: ~30-70 min (early-stop at patience=15; epoch ~11
#     convergence per R-19 precedent) × 5 seeds = ~2.5-5.9 hr
#   - Per-seed signal export + readability backtest: ~5-10 min × 5 = ~25-50 min
#   - Analyzer + ledger + commit/push: ~2 hr
#   - TOTAL: ~5-8 hr (vs banner 3.5 hr)
#
# **CRITICAL ANTI-DRIFT (preserve through compaction)**:
#   1. PT_precision is computed from CLASSIFICATION confusion matrix at training
#      eval time (`lob-model-trainer/.../training/metrics.py:251-258` per banner).
#      Cost-model-INDEPENDENT.
#   2. Backtest OptRet/WinRate WILL DIFFER from R-19's reported numbers because
#      HF-1 shipped POST-R-19 changing IV=0.40 → 0.25 for Deep ITM (factory
#      default mode-aware). H1 verdict uses PT_precision (clean); H4/cost-floor
#      verdict needs cost-model anchor clarity.
#   3. CompatibilityContract (hft-contracts/.../compatibility.py:104-131) is
#      11 fields — seed NOT in it. Expected: 1 distinct compat_fp across all 5
#      seeds; 5 distinct experiment_provenance_hash (TLOB carries rng_state).
#   4. tlob_num_heads=1 LOCKED per #PY-236 (paper-canonical; sweep over heads
#      would require feature-attention divisibility check at lob-models/.../
#      tlob.py:166-173 — out of scope for this cycle).
#   5. R-19's stored seed_42 anchor: PT_precision=0.269 (from EXPERIMENT_INDEX
#      L2587); R-17a baseline: PT_precision=0.220 (EXPERIMENT_INDEX L1474).
#
# =============================================================================
# PRE-REGISTERED HYPOTHESES (per hft-rules §13 — LOCKED BEFORE RUN)
# =============================================================================
#
#   H1 PRIMARY (does R-19 lift survive perturbation?):
#
#     H1.a Point-estimate persistence:
#       |mean(PT_precision_seeds_43_47) - 0.269| ≤ 0.020
#       (within ±2.0pp absolute of R-19 single-seed = ~half the +4.9pp lift)
#
#     H1.b R-17a CI separation (BINDING constraint):
#       Bootstrap CI lower bound > 0.220 at α=0.05, B=10000 iterations via
#       hft_metrics.block_bootstrap_ci(paired=False, n_bootstraps=10000,
#                                       block_length=1) v0.1.11.
#       Bootstrap input is the N=5 array of per-seed PT_precision values.
#       block_length=1 because seeds are INDEPENDENT (no temporal correlation
#       across seeds).
#
#     H1.c Cost-floor separation (INFORMATIONAL, NOT binding):
#       Bootstrap CI lower bound > 0.2681 (= 0.220 + cost-economics floor 0.05).
#       Path D-REFINED Option B Step 2 verdict said R-19 was 0.08pp SHY of
#       this; multi-seed CI > 0.2681 would CONVERT the verdict from
#       INDETERMINATE-COST-INSUFFICIENT to GO.
#
#   H2 BASELINE (architectural lift stability):
#     H2.a Magnitude: mean(PT_precision_seeds) > 0.220 (single-side over R-17a)
#     H2.b Stability: std(PT_precision_seeds) < 0.020 (2.0pp absolute σ floor)
#
#   H3 ARCHITECTURAL INVARIANT (Phase A.3 REDESIGN — TLOB is NOT RNG-free):
#     H3.a Phase Y composer correctness: 5 seeds → 5 DISTINCT
#          experiment_provenance_hash values (TLOB carries rng_state into
#          model_state_dict → epH varies per seed)
#     H3.b Corpus identity preserved: 5 seeds → 1 IDENTICAL
#          compatibility_fingerprint = "dd21d079228096917c6db63227bc71d2f14534dbebb5a4a939eef19732791eaf"
#          (R-19 anchor; per BACKTEST_INDEX L1409)
#     H3.c Model architecture identity preserved: 5 seeds → 1 IDENTICAL
#          model_config_hash = "2dc7eeef5192db921ed348364fb4c76fbc5e3e917a69929791e016a99ee16a0e"
#          (R-19 anchor; per BACKTEST_INDEX L1410; seed NOT in mch per #PY-94
#          closure + _LOSS_TUNING_KEYS denylist at compatibility.py:86)
#     H3.d Predicted-array divergence (RNG actually perturbs):
#          At least 2 of 5 seeds produce DIFFERENT SHA-256 of
#          predicted_returns.npy (sanity: RNG not silently swallowed)
#
# =============================================================================
# DECISION MATRIX (LOCKED PRE-RUN per Agent B)
# =============================================================================
#
#   GO — VALIDATED ARCHITECTURAL LIFT:
#     H1.a PASS (mean within ±2pp of R-19's 0.269)
#     AND H1.b PASS (CI lower > 0.220)
#     AND H2.a/b PASS
#     AND H3.a-d PASS
#     → +4.9pp lift VALIDATED as architectural (not seed noise)
#     → R-17a Lesson #95 REFUTATION holds
#     → Phase 2 TB design matrix can rest on this premise
#     → Next-cycle authorization for Phase 2 TB with informed prior
#
#   GO-LIFTED-AND-RAISED:
#     mean(PT_precision_seeds) > 0.289 (above R-19 single-seed)
#     AND H1.b PASS
#     AND H2.a/b PASS
#     AND H3 PASS
#     → R-19 was conservative single-seed; lift LARGER than 4.9pp
#     → Document new central estimate
#     → Cost-floor (35.7% PT precision break-even at 40/20 TB barriers) may
#       become reachable — re-evaluate R-18 cost-aware sweep priority
#
#   REFUTE — R-17a PLATEAU CONFIRMED:
#     H1.b FAIL (CI lower ≤ 0.220) OR mean(PT_precision_seeds) ≤ 0.220
#     → +4.9pp R-19 lift was within seed noise; FALSIFIED
#     → Close R-17a Lesson #95 REFUTATION as PREMATURE
#     → Phase 2 TB matrix INVALIDATED (rests on falsified premise)
#     → PIVOT recommendations (M8 pre-registered):
#         (a) R-20 HMHP cascade: different architecture class (genuinely
#             different from Logistic flatten + TLOB attention); CLAUDE.md
#             93.88% high-conviction DA on event-based 128-feat
#         (b) R-18 cost-aware barrier sweep (with theta scaling + slippage
#             realism applied per Wave 2 Agent C cost-EV correction)
#
#   INDETERMINATE — DIRECTIONAL BUT MAGNITUDE UNCERTAIN:
#     H1.a borderline (mean ∈ [0.249, 0.269) or > 0.289)
#     AND H1.b PASS
#     → Direction real but magnitude uncertain
#     → Report mean ± bootstrap CI
#     → Manual follow-up cycle decision: extend to N=10 OR accept partial-lift
#       claim with current CI
#
#   INDETERMINATE-DOWNGRADED-NEED-N10:
#     σ(PT_precision_seeds) > 0.040 (M5 interim analysis gate)
#     → Variance assumption σ≈2% FALSIFIED
#     → Current N=5 power is insufficient for confident verdict
#     → Manual follow-up cycle: add seeds 48-52 for N=10 (cycle11_r19_multi_seed_extension.yaml)
#
#   ABORT — ARCHITECTURAL INVARIANT VIOLATED:
#     Any H3.a/b/c/d FAIL
#     → Bug in cycle: config drift OR RNG capture failure OR Phase Y composer regression
#     → Investigate BEFORE issuing scientific verdict
#
# =============================================================================
# EDGE CASE DISPOSITIONS (LOCKED PRE-RUN per Agent B + C)
# =============================================================================
#
#   1. 4-of-5 pass H1.a, 1 outlier seed drops to 22-23%:
#      → GO IF outlier's PT_precision > 0.220 (still above R-17a) AND outlier
#        removal does not flip H1.b CI lower below 0.220 (sensitivity check).
#        Report raw AND outlier-trimmed means.
#      → INDETERMINATE otherwise.
#
#   2. All 5 seeds at 23-25% range (above R-17a, below R-19):
#      → INDETERMINATE-DOWNGRADED. R-19 lift survives directionally but at
#        lower-than-claimed magnitude. Do NOT cherry-pick as full GO.
#
#   3. All 5 seeds at 22.0-22.5% (tight cluster at R-17a baseline):
#      → REFUTE. R-19 was positive-tail outlier. +4.9pp claim falsified.
#
#   4. All 5 seeds at 30%+ (large upward drift):
#      → GO-LIFTED-AND-RAISED. R-19 conservative. Re-evaluate cost-economics
#        break-even (35.7% PT precision). If mean crosses 35.7%, cost-floor
#        FLIPS — major re-prioritization.
#
#   5. H3.a FAIL (all 5 seeds produce identical epH):
#      → ABORT. RNG silently swallowed; TLOB run as if RNG-free. Bug in
#        Phase Y composer or trainer seed plumbing.
#
# =============================================================================
# OPERATIONAL REQUIREMENTS (LOCKED PRE-RUN per Agent C)
# =============================================================================
#
#   **--force flag**: REQUIRED at sweep launch to override Phase Y cross-cycle
#   dedup. Without --force, if any cell's fingerprint matches a prior R-19 or
#   R-19-class ledger record, the cell SKIPS training silently. Test commit:
#       hft-ops sweep run experiments/sweeps/cycle10_r19_multi_seed.yaml --gpus 1 --force
#   Per cycle9_r16e L34-50 precedent + Agent C F2 finding.
#
#   **keep_top_k_checkpoints=1**: configured in train block below to bound
#   disk per Agent C F8 (~10 MB per seed best.pt; ~50 MB across 5 seeds).
#
#   **Cost-model anchor**: backtest invocations below use stages.backtesting
#   default cost model (POST-HF-1 IV=0.25 mode-aware). R-19's stored
#   OptRet=-3.11% is PRE-HF-1; NOT directly comparable. PT_precision IS
#   comparable (cost-model-independent training-time metric).
#
#   **Analyzer**: NEW r19_multi_seed_analysis.py (~250 LOC; to be authored
#   Phase 2). Reuses hft_metrics.block_bootstrap_ci v0.1.11 + analyze_r17a_vs_r19_pt_precision
#   patterns. NOT r16e_analysis.py (hardcoded for N=10 + 40 grid).
#
# =============================================================================
# Usage:
#   hft-ops sweep expand  experiments/sweeps/cycle10_r19_multi_seed.yaml
#   hft-ops sweep run     experiments/sweeps/cycle10_r19_multi_seed.yaml --gpus 1 --force
#   hft-ops sweep results experiments/sweeps/cycle10_r19_multi_seed.yaml
#   python hft-ops/scripts/analyze_r19_multi_seed.py <sweep_id>
# =============================================================================

experiment:
  name: "cycle10_r19_multi_seed"
  description: >
    #PY-243 R-19 multi-seed validation cycle. N=5 seeds (43-47) on R-19's
    TLOB + TB v3p0 architecture. Tests whether R-19's single-seed +4.9pp
    PT precision lift over R-17a survives perturbation. Per Lesson #12
    mandatory + R-16e #93 precedent. Pre-registered H1.a/b/c + H2 + H3 +
    decision matrix locked PRE-RUN per saved feedback memory pre-impl
    adversarial gate (3 parallel agents 2026-05-16 LATE NIGHT). GO →
    Phase 2 TB unblocked with informed prior; REFUTE → pivot to R-20 HMHP
    OR R-18 cost-aware sweep; INDETERMINATE → manual N=10 extension.
  hypothesis: >
    H1 PRIMARY: mean(PT_precision_seeds_43_47) within ±2.0pp of R-19's
    0.269 AND bootstrap CI lower > 0.220 R-17a baseline AND CI lower
    > 0.2681 cost-floor (informational). H2 BASELINE: mean > 0.220 AND
    std < 0.020. H3 INVARIANT: 5 distinct epH, 1 compat_fp = R-19's,
    1 mch = R-19's. M5 interim-analysis: if σ > 4% post-run, downgrade
    verdict to INDETERMINATE-NEED-N10.
  contract_version: "3.0"
  tags:
    - nvda
    - cycle10
    - r19
    - py243
    - multi_seed
    - tlob
    - triple_barrier
    - tb_v3p0
    - validation
    - phase_y_composability
    - rigor_floor
    - architectural_lift

pipeline_root: ".."

stages:
  # EXTRACTION DISABLED: TB v3p0 corpus already on disk (R-17a + R-19 used same).
  # Path: data/exports/nvda_v3p0_tb_pt40_sl20_h30/
  extraction:
    enabled: false
    skip_if_exists: true
    config: "feature-extractor-MBO-LOB/configs/nvda_v3p0_tb_pt40_sl20_h30.toml"
    output_dir: "data/exports/nvda_v3p0_tb_pt40_sl20_h30"

  raw_analysis:
    enabled: false

  dataset_analysis:
    enabled: false

  # VALIDATION DISABLED (post first-launch 2-bug cascade closure):
  # IC gate (fast_gate) is REGRESSION-oriented — return_std_bps + stability thresholds
  # assume float-bps labels. TB v3p0 class-indices {0,1,2} produce return_std_bps=0.702
  # + stability=1.901 → gate FAILS by definition on healthy classification data.
  #
  # First-launch empirical evidence (2026-05-16 22:02-23:24 CEST): gate fired FAIL with
  # disposition default=warn (training continued past gate cleanly), BUT downstream cell
  # status marked 'failed' → signal_export + backtest SKIPPED → Phase Y composer never
  # fired (experiment_provenance_hash=None, model_config_hash=None) → sweep coordinator's
  # --on-failure default `abort` triggered → seeds 44-47 NEVER LAUNCHED. ~80 min wasted.
  #
  # FIX: disable validation entirely (mirrors R-19/R-17a precedent which ran via train.py
  # direct without gate). Re-launch adds --on-failure continue for defense-in-depth.
  # 2-bug cascade documented as new PHASE_P_BACKLOG finding for future sweep design.
  validation:
    enabled: false

  training:
    enabled: true
    horizon_value: 0  # TB v3p0 corpus has 3 horizons in labels.npy; primary_horizon_idx=0
                      # per r19 leaf YAML (precomputed labels — task=classification)
    trainer_config:
      name: cycle10_r19_multi_seed_base
      description: >
        R-19 multi-seed base. Inline-merged from r19_tlob_tb_v3p0_h30.yaml _base
        composition: nvda_98feat_triple_barrier.yaml + triple_barrier_volscaled.yaml
        + classification_triple_barrier.yaml + r19 overrides. Single axis:
        train.seed.

      data:
        # From r19 override (PRE-Phase-O archive path):
        data_dir: "../data/exports/nvda_v3p0_tb_pt40_sl20_h30"
        # From nvda_98feat_triple_barrier.yaml base:
        feature_count: 98
        # NEW 2026-05-19 — #PY-308 BUG2-A closure (PHASE_P_BACKLOG L6266):
        # FeatureSet registration ensures Phase Y composer reads
        # feature_set_content_hash via signal_metadata.feature_set_ref.content_hash;
        # without this, composer returns experiment_provenance_hash=None (per
        # graceful-degradation policy at experiment_record.py:780). content_hash
        # is IDENTICAL to nvda_short_term_98_src98_v1.json (same PRODUCT: indices
        # 0-97, SFC=98, cv=3.0) — collision is BY DESIGN per canonical_hash SSoT.
        feature_set: "nvda_r19_tb_v3p0_98feat_v1"
        # From triple_barrier_volscaled.yaml base:
        labeling_strategy: triple_barrier
        num_classes: 3
        # From r19 override (window_size=20 for v3p0 corpus):
        sequence:
          window_size: 20
          stride: 1
        # From nvda_98feat_triple_barrier.yaml base:
        normalization:
          strategy: hybrid
          eps: 1.0e-8
          clip_value: 10.0
          exclude_features: [93]
        # From r19 override:
        labels:
          source: "precomputed"   # int8 labels.npy direct read (no LabelFactory)
          task: "classification"  # TB class-index {0,1,2}
        cache_in_memory: true

      model:
        # From r19 override (model_type=tlob):
        model_type: "tlob"
        input_size: 98
        num_classes: 3
        dropout: 0.1
        # TLOB-specific hyperparameters (paper-canonical for dataset_type=nvda):
        tlob_hidden_dim: 40
        tlob_num_layers: 4
        tlob_num_heads: 1          # LOCKED per #PY-236
        tlob_use_bin: true
        tlob_use_sinusoidal_pe: true
        tlob_mlp_expansion: 4.0
        tlob_dataset_type: "nvda"

      train:
        # From classification_triple_barrier.yaml + triple_barrier_volscaled.yaml bases:
        task_type: "multiclass"
        loss_type: "focal"
        focal_gamma: 2.0
        use_class_weights: true       # trainer auto-computes inverse-freq from train_loader
        batch_size: 64
        learning_rate: 1.0e-4
        weight_decay: 1.0e-5
        epochs: 100
        early_stopping_patience: 15
        gradient_clip_norm: 1.0
        scheduler: "cosine"
        # From r19 override (OOM-on-fork guard with cache_in_memory=true):
        num_workers: 0
        pin_memory: true
        mixed_precision: false
        # Seed: BASE value 42; OVERRIDDEN by sweep axis train.seed (43-47)
        seed: 42

      output_dir: "outputs/experiments/cycle10_r19_multi_seed_base"
      log_level: INFO
      tags:
        - cycle10
        - r19
        - py243
        - multi_seed
        - tlob
        - tb_v3p0
        - classification

    overrides:
      data.data_dir: "${stages.extraction.output_dir}"

    output_dir: "hft-ops/ledger/runs/${experiment.name}_${timestamp}"

  signal_export:
    enabled: true
    script: "lob-model-trainer/scripts/export_signals.py"
    checkpoint: "${stages.training.output_dir}/checkpoints/final.pt"
    split: test
    output_dir: "outputs/experiments/${sweep.point_name}/signals/test"

  backtesting:
    enabled: true
    script: "lob-backtester/scripts/run_readability_backtest.py"
    signals_dir: "outputs/experiments/${sweep.point_name}/signals/test"
    # **COST MODEL ANCHOR**: POST-HF-1 (IV=0.25 for Deep ITM via mode-aware
    # factory; HF-1 commit 175307c shipped 2026-05-16 LATE NIGHT). R-19's
    # stored OptRet=-3.11% was PRE-HF-1 IV=0.40; multi-seed OptRet/WinRate
    # numbers NOT directly comparable. PT_precision IS comparable (training-
    # time confusion matrix; cost-model-independent).
    extra_args:
      - "--exchange"
      - "XNAS"
      - "--primary-horizon-idx"
      - "0"          # TB v3p0 horizon_idx=0 per r19 leaf YAML precedent
      - "--min-confidence"
      - "0.40"       # Same as R-19 (controlled comparison per banner)
      - "--bin-seconds"
      - "60"         # NEW 2026-05-19 — #PY-307 closure; MANDATORY post sister-cycle FIND-NEW-01 (`b9a6d6b` lob-backtester 2026-05-16 morning) which made --bin-seconds OR --events-per-minute required when --zero-dte enabled (default). TB v3p0 corpus is 60s bin sampling.

# =============================================================================
# Sweep definition — 1 axis × 5 seeds = 5 grid points
# =============================================================================

sweep:
  name: "cycle10_r19_multi_seed"
  strategy: "grid"
  axes:
    - name: "train_seed"
      values:
        - label: "seed_43"
          overrides:
            train.seed: 43
        - label: "seed_44"
          overrides:
            train.seed: 44
        - label: "seed_45"
          overrides:
            train.seed: 45
        - label: "seed_46"
          overrides:
            train.seed: 46
        - label: "seed_47"
          overrides:
            train.seed: 47
