experiment:
  name: "cycle12_r20_hmhp_r_multi_seed"
  description: >
    R-20-HMHP-R multi-seed validation cycle. N=5 seeds (43-47) on
    e5_timebased_60s_v3p0 (98 feat, multi-horizon regression [10,60,300]).
    Tests cascading-decoder architecture-axis lift per Lesson #12 multi-seed
    rigor floor + R-16e Lesson #93 precedent. Pre-registered H1.a-d /
    H2.a-c / H3.a-f / H4.a-c gates LOCKED PRE-RUN. H3 reframed empirically
    post-first-cell (NOT vs Stage 6 archeology per Wave 2Y REFUTE). δ=12.6
    THIS cycle's baseline (NOT Stage 6 comparable). H5 COST observational
    per L106.
  hypothesis: >
    H1 PRIMARY: mean(test_h10_ic_seeds_43_47) > 0.30 floor + paired bootstrap
    CI lower > 0.10. H2: mean(h60) > 0.10 AND mean(h300) > 0.05 AND std(h10)
    < 0.040. H3: 5 seeds → all populated + 1 IDENTICAL compat_fp/epH/mch +
    5 distinct pred SHA-256. H4: agreement_ratio.npy emitted + non-degenerate
    (mean ∈ [0.4, 0.9], std > 0.05). H5: COST observational.
  contract_version: "3.0"
  tags:
    - nvda
    - cycle12
    - r20
    - r20_multi_seed
    - hmhp_r
    - cascading-decoder
    - confirmation-module
    - multi_seed
    - architecture-axis
    - regression
    - h10
    - 60s
    - huber
    - v3p0
    - phase_y_composability
    - tlob-stage-2-comparison
    - rigor_floor

pipeline_root: ".."

stages:
  # EXTRACTION DISABLED: e5_timebased_60s_v3p0 already on disk
  extraction:
    enabled: false
    skip_if_exists: true
    config: "feature-extractor-MBO-LOB/configs/e5_timebased_60s_v3p0.toml"
    output_dir: "data/exports/e5_timebased_60s_v3p0"

  raw_analysis:
    enabled: false

  dataset_analysis:
    enabled: false

  # VALIDATION DISABLED: IC gate is point-return-oriented; v3p0 smoothed-return
  # labels via LabelFactory at trainer load-time don't satisfy fast_gate
  # regression-oriented thresholds. R-19/Stage 6/R-17a precedent.
  validation:
    enabled: false

  training:
    enabled: true
    horizon_value: 10
    trainer_config:
      name: cycle12_r20_hmhp_r_multi_seed_base
      description: >
        R-20-HMHP-R multi-seed base trainer config. Inline-merged from
        r20_hmhp_r_v3p0_h10_primary.yaml _base composition:
        hmhp_cascade_regression.yaml + nvda_e5_60s.yaml +
        regression_huber.yaml + regression_default.yaml. Production-scale
        overrides (epochs=100, patience=15, hmhp_horizons=[10,60,300],
        hmhp_loss_weights H10-primary, hmhp_primary_horizon_idx=0 EXPLICIT
        per #PY-43/#PY-57/N4 dormant-bug displacement). δ=12.6 THIS cycle's
        baseline. Single sweep axis: train.seed.

      data:
        data_dir: "../data/exports/e5_timebased_60s_v3p0"
        feature_count: 98
        feature_set: "nvda_short_term_98_src98_v1"
        sequence:
          window_size: 20
          stride: 1
        normalization:
          strategy: hybrid
          eps: 1.0e-8
          clip_value: 10.0
          exclude_features: [93]
        labels:
          source: "forward_prices"
          task: "regression"
          return_type: "smoothed_return"
          horizons: [10, 60, 300]
          primary_horizon_idx: 0
        cache_in_memory: true

      model:
        model_type: "hmhp_regression"
        input_size: 98
        hmhp_horizons: [10, 60, 300]
        hmhp_primary_horizon_idx: 0
        hmhp_loss_weights:
          H10: 0.50
          H60: 0.25
          H300: 0.15
          consistency: 0.10
        hmhp_pool_mode: "mean"
        hmhp_use_confirmation: true
        hmhp_encoder_hidden_dim: 64
        hmhp_num_encoder_layers: 2
        regression_loss_delta: 12.6
        dropout: 0.1

      train:
        task_type: "regression"
        loss_type: "huber"
        batch_size: 64
        learning_rate: 1.0e-4
        weight_decay: 1.0e-5
        epochs: 100
        early_stopping_patience: 15
        gradient_clip_norm: 1.0
        scheduler: "cosine"
        num_workers: 0
        pin_memory: true
        mixed_precision: false
        seed: 42

      output_dir: "outputs/experiments/cycle12_r20_hmhp_r_multi_seed_base"
      log_level: INFO
      tags:
        - cycle12
        - r20_multi_seed
        - hmhp_r
        - cascading-decoder
        - regression
        - h10
        - v3p0
        - tlob-comparison

    overrides:
      data.data_dir: "${stages.extraction.output_dir}"

    output_dir: "hft-ops/ledger/runs/${experiment.name}_${timestamp}"

  signal_export:
    enabled: true
    script: "lob-model-trainer/scripts/export_signals.py"
    checkpoint: "${stages.training.output_dir}/checkpoints/final.pt"
    split: test
    output_dir: "outputs/experiments/${sweep.point_name}/signals/test"

  backtesting:
    enabled: true
    script: "lob-backtester/scripts/run_regression_backtest.py"
    signals_dir: "outputs/experiments/${sweep.point_name}/signals/test"
    extra_args:
      - "--exchange"
      - "XNAS"
      - "--primary-horizon-idx"
      - "0"
      - "--deep-itm"
      - "--bin-seconds"
      - "60"

# =============================================================================
# Sweep definition — 1 axis × 5 seeds = 5 grid points
# =============================================================================

sweep:
  name: "cycle12_r20_hmhp_r_multi_seed"
  strategy: "grid"
  axes:
    - name: "train_seed"
      values:
        - label: "seed_43"
          overrides:
            train.seed: 43
        - label: "seed_44"
          overrides:
            train.seed: 44
        - label: "seed_45"
          overrides:
            train.seed: 45
        - label: "seed_46"
          overrides:
            train.seed: 46
        - label: "seed_47"
          overrides:
            train.seed: 47
